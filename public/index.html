<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Research Paper Radar</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f2;
        --ink: #1d2528;
        --muted: #667174;
        --line: #d9ded8;
        --panel: #ffffff;
        --accent: #0e6f68;
        --accent-soft: #e0f1ee;
        --warn: #a85f00;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.5;
      }

      header {
        border-bottom: 1px solid var(--line);
        background: #eef3ee;
      }

      .wrap {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
      }

      .hero {
        padding: 34px 0 26px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 5vw, 44px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        max-width: 760px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: 210px minmax(220px, 1fr) 150px 150px;
        gap: 10px;
        padding: 18px 0;
      }

      input,
      select {
        min-height: 42px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 12px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
      }

      main {
        padding: 18px 0 40px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 14px;
        color: var(--muted);
        font-size: 14px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 650;
      }

      .list {
        display: grid;
        gap: 10px;
      }

      .paper {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 16px;
      }

      .paper h2 {
        margin: 0 0 8px;
        font-size: 18px;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .paper h2 a {
        color: var(--ink);
        text-decoration-color: var(--accent);
        text-underline-offset: 3px;
      }

      .byline,
      .summary,
      .abstract,
      .links {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      .summary {
        color: #1f3938;
        background: #f1f8f6;
        border-left: 3px solid var(--accent);
        border-radius: 6px;
        padding: 10px 12px;
      }

      .abstract {
        color: #3f4a4d;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .tag {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .links a {
        color: var(--accent);
        font-weight: 650;
        text-decoration: none;
      }

      .links a + a {
        margin-left: 10px;
      }

      .empty,
      .error {
        border: 1px dashed var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.68);
        padding: 24px;
        color: var(--muted);
      }

      .error {
        color: var(--warn);
      }

      @media (max-width: 760px) {
        .toolbar {
          grid-template-columns: 1fr;
        }

        .hero {
          padding-top: 26px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap hero">
        <h1>Research Paper Radar</h1>
        <p id="subtitle" class="subtitle">
          每日自动收集 BIM/IFC、自进化 Agent 与超图 RAG 相关论文。
        </p>
      </div>
    </header>

    <section class="wrap toolbar" aria-label="筛选论文">
      <select id="topic" aria-label="研究主题"></select>
      <input id="search" type="search" placeholder="搜索标题、作者、摘要或关键词" />
      <select id="source">
        <option value="">全部来源</option>
      </select>
      <select id="sort">
        <option value="published">按发布日期</option>
        <option value="score">按相关性</option>
      </select>
    </section>

    <main class="wrap">
      <div id="meta" class="meta"></div>
      <section id="papers" class="list" aria-live="polite"></section>
    </main>

    <script>
      const topics = [
        {
          slug: "bim-ifc",
          title: "BIM/IFC",
          description: "Building Information Modeling、IFC、openBIM 与 Industry Foundation Classes 相关论文。",
          dataUrl: "./papers.json",
        },
        {
          slug: "self-evolving-agent",
          title: "Self-Evolving Agents",
          description: "自进化、自改进与持续学习的 AI/LLM Agent 相关工作。",
          dataUrl: "./self-evolving-agent/papers.json",
        },
        {
          slug: "hypergraph-rag",
          title: "Hypergraph RAG",
          description: "使用超图进行知识组织、检索或推理的 RAG 相关工作。",
          dataUrl: "./hypergraph-rag/papers.json",
        },
      ];

      const state = {
        papers: [],
        meta: {},
        topic: "bim-ifc",
        query: "",
        source: "",
        sort: "published",
      };

      const el = {
        meta: document.querySelector("#meta"),
        papers: document.querySelector("#papers"),
        subtitle: document.querySelector("#subtitle"),
        topic: document.querySelector("#topic"),
        search: document.querySelector("#search"),
        source: document.querySelector("#source"),
        sort: document.querySelector("#sort"),
      };

      function formatDate(value) {
        if (!value) return "未知日期";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value;
        return new Intl.DateTimeFormat("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(date);
      }

      function escapeHtml(value) {
        return String(value || "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function searchableText(paper) {
        return [
          paper.title,
          paper.abstract,
          paper.ai_summary_zh,
          paper.source,
          paper.venue,
          paper.authors?.join(" "),
          paper.matched_terms?.join(" "),
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
      }

      function renderMeta(meta, count) {
        const generated = meta.generated_at ? formatDate(meta.generated_at) : "尚未生成";
        const topicTitle = meta.topic?.title || topics.find((topic) => topic.slug === state.topic)?.title || "";
        el.meta.innerHTML = `
          <span class="pill">${escapeHtml(topicTitle)} · ${count} 篇论文</span>
          <span>数据更新时间：${escapeHtml(generated)}</span>
          <span>回看窗口：${escapeHtml(meta.query_window_days || "-")} 天</span>
        `;
      }

      function renderSources() {
        const sources = [...new Set(state.papers.map((paper) => paper.source).filter(Boolean))].sort();
        el.source.innerHTML = `<option value="">全部来源</option>`;
        for (const source of sources) {
          const option = document.createElement("option");
          option.value = source;
          option.textContent = source;
          el.source.appendChild(option);
        }
      }

      function filteredPapers() {
        const query = state.query.trim().toLowerCase();
        const filtered = state.papers.filter((paper) => {
          const matchesQuery = !query || searchableText(paper).includes(query);
          const matchesSource = !state.source || paper.source === state.source;
          return matchesQuery && matchesSource;
        });

        filtered.sort((a, b) => {
          if (state.sort === "score") {
            return Number(b.score || 0) - Number(a.score || 0);
          }
          return String(b.published || "").localeCompare(String(a.published || ""));
        });

        return filtered;
      }

      function renderPapers() {
        const papers = filteredPapers();
        renderMeta(state.meta, papers.length);

        if (!papers.length) {
          el.papers.innerHTML = `<div class="empty">没有匹配的论文。可以放宽搜索词或等待下一次自动采集。</div>`;
          return;
        }

        el.papers.innerHTML = papers
          .map((paper) => {
            const title = escapeHtml(paper.title || "Untitled");
            const url = escapeHtml(paper.url || paper.pdf_url || "#");
            const authors = escapeHtml((paper.authors || []).slice(0, 8).join(", "));
            const authorSuffix = (paper.authors || []).length > 8 ? " 等" : "";
            const terms = (paper.matched_terms || [])
              .slice(0, 8)
              .map((term) => `<span class="tag">${escapeHtml(term)}</span>`)
              .join("");
            const doi = paper.doi ? `<a href="${escapeHtml(paper.doi)}">DOI</a>` : "";
            const pdf = paper.pdf_url ? `<a href="${escapeHtml(paper.pdf_url)}">PDF</a>` : "";
            const venue = paper.venue ? ` · ${escapeHtml(paper.venue)}` : "";
            const source = paper.source ? ` · ${escapeHtml(paper.source)}` : "";
            const summary = paper.ai_summary_zh
              ? `<p class="summary"><strong>AI中文摘要：</strong>${escapeHtml(paper.ai_summary_zh)}</p>`
              : "";
            const abstract = paper.abstract
              ? `<p class="abstract"><strong>原始摘要：</strong>${escapeHtml(paper.abstract).slice(0, 520)}${paper.abstract.length > 520 ? "..." : ""}</p>`
              : "";

            return `
              <article class="paper">
                <h2><a href="${url}">${title}</a></h2>
                <p class="byline">${authors}${authorSuffix}</p>
                <p class="byline">${formatDate(paper.published)}${venue}${source} · 相关性 ${escapeHtml(paper.score || 0)}</p>
                ${summary}
                ${abstract}
                <div class="tags">${terms}</div>
                <p class="links"><a href="${url}">论文链接</a>${doi}${pdf}</p>
              </article>
            `;
          })
          .join("");
      }

      async function loadTopic(slug) {
        const topic = topics.find((candidate) => candidate.slug === slug) || topics[0];
        state.topic = topic.slug;
        state.source = "";
        el.topic.value = topic.slug;
        el.subtitle.textContent = topic.description;
        el.meta.innerHTML = "";
        el.papers.innerHTML = `<div class="empty">正在加载 ${escapeHtml(topic.title)} 数据…</div>`;

        try {
          const response = await fetch(topic.dataUrl, { cache: "no-store" });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          state.meta = payload;
          state.papers = payload.papers || [];
          renderSources();
          renderPapers();
        } catch (error) {
          state.meta = {};
          state.papers = [];
          el.meta.innerHTML = "";
          el.papers.innerHTML = `<div class="error">无法加载 ${escapeHtml(topic.title)} 数据：${escapeHtml(error.message)}</div>`;
        }
      }

      function boot() {
        for (const topic of topics) {
          const option = document.createElement("option");
          option.value = topic.slug;
          option.textContent = topic.title;
          el.topic.appendChild(option);
        }

        el.topic.addEventListener("change", (event) => {
          location.hash = event.target.value;
          loadTopic(event.target.value);
        });
        el.search.addEventListener("input", (event) => {
          state.query = event.target.value;
          renderPapers();
        });
        el.source.addEventListener("change", (event) => {
          state.source = event.target.value;
          renderPapers();
        });
        el.sort.addEventListener("change", (event) => {
          state.sort = event.target.value;
          renderPapers();
        });

        const requestedTopic = location.hash.slice(1);
        loadTopic(topics.some((topic) => topic.slug === requestedTopic) ? requestedTopic : topics[0].slug);
      }

      boot();
    </script>
  </body>
</html>
